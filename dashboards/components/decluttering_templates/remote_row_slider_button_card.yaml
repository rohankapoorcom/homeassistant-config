# TV-remote-only slider tiles. Transparent chip fill per
# https://github.com/custom-cards/slider-button-card — override --btn-bg-color-*
# on :host via card_mod; keep layout/stock heights (do not shrink .button or fade
# .slider-bg). Frosted chrome on ha-card to match `button_card_templates/remote.yaml`.
remote_row_slider_button_card:
  card:
    type: custom:slider-button-card
    entity: '[[entity]]'
    name: '[[name]]'
    action_button: '[[action_button]]'
    card_mod:
      style: |
        :host {
          --btn-bg-color-off: transparent;
          --btn-bg-color-on: transparent;
          --label-color-on: var(--primary-text-color);
          --label-color-off: var(--primary-text-color);
          --state-color-on: var(--primary-text-color);
          --state-color-off: var(--secondary-text-color);
          --action-icon-color-on: var(--paper-item-icon-color);
          --action-icon-color-off: var(--paper-item-icon-color);
        }
        ha-card {
          --ha-card-background: var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)));
          border: var(--ha-card-border, none);
          border-radius: var(--ha-card-border-radius, 10px);
          font-size: 12px;
        }
    slider:
      direction: '[[direction]]'
      background: gradient
      use_percentage_bg_opacity: false
      toggle_on_click: '[[toggle_on_click]]'
  default:
    - direction: left-right
    - toggle_on_click: false
    - action_button:
        mode: custom
        show: true
        tap_action:
          action: toggle
