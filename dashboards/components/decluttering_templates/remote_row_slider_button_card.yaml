# Slider tiles visually aligned with `button_card_templates/remote.yaml`. The stock
# slider-button-card ignores a top-level `styles` map; it applies `.button.off` with
# `--btn-bg-color-off` (solid blue-gray). Use `card_mod` to get frosted chips and
# transparent off-state fill. Used on TV remote bottom rows only.
remote_row_slider_button_card:
  card:
    type: custom:slider-button-card
    entity: '[[entity]]'
    name: '[[name]]'
    action_button: '[[action_button]]'
    card_mod:
      style: |
        ha-card {
          --ha-card-background: var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)));
          border: var(--ha-card-border, none);
          border-radius: var(--ha-card-border-radius, 10px);
          font-size: 12px;
          --btn-bg-color-off: transparent;
          --btn-bg-color-on: transparent;
        }
        .button {
          min-height: 3.25rem !important;
          padding: 8px 6px !important;
          box-sizing: border-box;
        }
        .button.off {
          background-color: transparent !important;
        }
        .text {
          padding: 0.35rem 0.4rem !important;
        }
        .name {
          font-size: 12px !important;
        }
        .state {
          font-size: 12px !important;
        }
        .slider .slider-bg {
          opacity: 0.33;
        }
        .off .slider .slider-bg {
          opacity: 1;
        }
    slider:
      direction: '[[direction]]'
      background: triangle
      toggle_on_click: '[[toggle_on_click]]'
  default:
    - direction: left-right
    - toggle_on_click: false
    - action_button:
        mode: custom
        show: true
        tap_action:
          action: toggle
