# TV-remote-only slider tiles. Frosted Glass (and similar) build the chip from a
# transparent ha-card plus ::before glass tint; painting --ha-card-background or
# --btn-bg-color-off with clear-background stacks an extra opaque layer and reads
# solid black when the slider shows nothing. Keep inner fills transparent so the
# theme glass shows through when off; see themes "card-mod-card" ha-card::before.
remote_row_slider_button_card:
  card:
    type: custom:slider-button-card
    entity: '[[entity]]'
    name: '[[name]]'
    action_button: '[[action_button]]'
    card_mod:
      style: |
        :host {
          --btn-bg-color-off: transparent;
          --btn-bg-color-on: transparent;
          --label-color-on: var(--primary-text-color);
          --label-color-off: var(--primary-text-color);
          --state-color-on: var(--primary-text-color);
          --state-color-off: var(--secondary-text-color);
          --action-icon-color-on: var(--paper-item-icon-color);
          --action-icon-color-off: var(--paper-item-icon-color);
        }
        ha-card {
          background: transparent !important;
          --ha-card-background: transparent;
          border: var(--ha-card-border, 1px solid rgba(255, 255, 255, 0.12));
          border-radius: var(--ha-card-border-radius, 10px);
          font-size: 12px;
        }
    slider:
      direction: '[[direction]]'
      background: gradient
      use_percentage_bg_opacity: false
      toggle_on_click: '[[toggle_on_click]]'
  default:
    - direction: left-right
    - toggle_on_click: false
    - action_button:
        mode: custom
        show: true
        tap_action:
          action: toggle
