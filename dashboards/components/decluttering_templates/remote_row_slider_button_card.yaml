# TV-remote-only slider tiles. Match `button_card_templates/remote.yaml` frosted
# chips; see https://github.com/custom-cards/slider-button-card — :host overrides.
# Off state: same surface as ha-card (not transparent) so tiles read like top source
# buttons; on state: .button is not .off so fill stays clear for the gradient.
remote_row_slider_button_card:
  card:
    type: custom:slider-button-card
    entity: '[[entity]]'
    name: '[[name]]'
    action_button: '[[action_button]]'
    card_mod:
      style: |
        :host {
          --btn-bg-color-off: var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)));
          --btn-bg-color-on: transparent;
          --label-color-on: var(--primary-text-color);
          --label-color-off: var(--primary-text-color);
          --state-color-on: var(--primary-text-color);
          --state-color-off: var(--secondary-text-color);
          --action-icon-color-on: var(--paper-item-icon-color);
          --action-icon-color-off: var(--paper-item-icon-color);
        }
        ha-card {
          --ha-card-background: var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)));
          border: var(--ha-card-border, 1px solid rgba(255, 255, 255, 0.12));
          border-radius: var(--ha-card-border-radius, 10px);
          font-size: 12px;
        }
    slider:
      direction: '[[direction]]'
      background: gradient
      use_percentage_bg_opacity: false
      toggle_on_click: '[[toggle_on_click]]'
  default:
    - direction: left-right
    - toggle_on_click: false
    - action_button:
        mode: custom
        show: true
        tap_action:
          action: toggle
