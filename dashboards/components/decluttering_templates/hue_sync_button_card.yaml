hue_sync_button_card:
  card:
    type: custom:button-card
    layout: icon_label
    show_label: true
    show_name: true
    color_type: icon
    size: 50%
    entity: media_player.living_room_sync_box
    icon: mdi:led-strip-variant
    name: Backlight
    hold_action:
      action: more-info
      haptic: selection
    triggers_update:
      - switch.living_room_sync_box_light_sync
      - select.living_room_sync_box_entertainment_area
    tap_action:
      action: call-service
      service: '[[script]]'
      haptic: success
    card_mod:
      style: |
        ha-card {
          --ha-card-background: var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)));
          border: var(--ha-card-border, 1px solid rgba(255, 255, 255, 0.12));
          border-radius: var(--ha-card-border-radius, 10px);
          font-size: 12px;
          min-height: 7rem;
          box-sizing: border-box;
        }
    state:
      - operator: template
        value: >
          [[[
            return states['switch.living_room_sync_box_light_sync'].state === 'on'
            && (states['select.living_room_sync_box_entertainment_area'].state === '[[entertainment_area]]')
          ]]]
        label: 'On'
        styles:
          card:
            - border: solid 2px var(--state-icon-active-color, rgb(255, 214, 10))
            - box-shadow: 0px 0px 12px 4px var(--state-icon-active-color, rgb(255, 214, 10))
            - '--ha-card-background': var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)))
          icon:
            - color: var(--state-icon-active-color, rgb(255, 214, 10))
          name:
            - color: var(--state-icon-active-color, rgb(255, 214, 10))
          label:
            - padding-left: 1ex
            - color: var(--primary-text-color, #fff)
      - operator: default
        label: 'Off'
    styles:
      card:
        - border-radius: var(--ha-card-border-radius, 10px)
        - padding: 8px 6px
        - margin: 0
        - font-size: 12px
        - min-height: 7rem
        - '--ha-card-background': var(--clear-background-color, var(--card-background-color, rgba(10, 10, 10, 0.4)))
        - border: var(--ha-card-border, 1px solid rgba(255, 255, 255, 0.12))
      grid:
        - grid-template-areas: '"i l l" "n n n"'
        - grid-template-rows: 33% auto
        - grid-template-columns: 33% auto
      icon:
        - width: 28px
        - padding: 0px
        - color: var(--paper-item-icon-color)
      label:
        - font-size: 12px
        - justify-self: right
        - padding: 0px
        - padding-left: 1ex
        - color: var(--primary-text-color)
      name:
        - justify-self: middle
        - align-self: end
        - font-size: 12px
        - padding: 0px
        - color: var(--primary-text-color)
        - white-space: normal
