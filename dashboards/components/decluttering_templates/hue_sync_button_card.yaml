hue_sync_button_card:
  card:
    type: custom:button-card
    template: light_button
    # Match slider_button_card row height (its layout uses ~1:1 and min-height ~7rem).
    aspect_ratio: 1/1
    entity: media_player.living_room_sync_box
    icon: mdi:led-strip-variant
    name: Backlight
    triggers_update:
      - switch.living_room_sync_box_light_sync
      - select.living_room_sync_box_entertainment_area
    tap_action:
      action: call-service
      service: '[[script]]'
      haptic: success
    state:
      - operator: template
        value: >
          [[[
            return states['switch.living_room_sync_box_light_sync'].state === 'on'
            && (states['select.living_room_sync_box_entertainment_area'].state === '[[entertainment_area]]')
          ]]]
        label: 'On'
        styles:
          card:
            - border: solid 2px var(--state-icon-active-color, var(--paper-item-icon-active-color, var(--primary-color)))
            - box-shadow: 0px 0px 12px 4px var(--state-icon-active-color, var(--paper-item-icon-active-color, var(--primary-color)))
            - '--ha-card-background': >-
                linear-gradient(to right, rgba(0, 0, 0, 0) -10%,
                var(--slider-color, var(--primary-color)) 100%)
            - '--ha-card-glass-tint': >-
                linear-gradient(to right, rgba(0, 0, 0, 0) -10%,
                var(--slider-color, var(--primary-color)) 100%)
          icon:
            - color: var(--state-icon-active-color, rgb(255, 214, 10))
          label:
            - color: var(--primary-text-color, #fff)
      - operator: default
        label: 'Off'
        styles:
          card:
            - border-radius: 10px
            - padding: 6px 6px 6px 6px
            - margin: 0% 0% 0% 0%
            - '--ha-card-background': rgba(0, 0, 0, 0)
            - '--ha-card-glass-tint': unset
            - border: solid 1px var(--primary-color)
            - box-shadow: none
    styles:
      card:
        - min-height: 7rem
        - border-radius: 10px
        - padding: 6px 6px 6px 6px
        - margin: 0% 0% 0% 0%
        - '--ha-card-background': rgba(0, 0, 0, 0)
