remote:
  variables:
    source: Receiver Source
    name: Name of Button
    script: Name of Script
  name: '[[[ return variables.name ]]]'
  size: 50%
  color_type: icon
  styles:
    name:
      - color: var(--paper-item-icon-color)
    label:
      - color: var(--paper-item-icon-color)
      - padding-left: 1ex
    card:
      - border-radius: var(--ha-card-border-radius, 10px)
      - padding: 8px 6px
      - margin: 0
      - font-size: 12px
      - '--ha-card-background': rgba(0, 0, 0, 0)
      - '--ha-card-glass-tint': unset
    icon:
      - color: |
          [[[
            const ent = variables.media_player_entity;
            const attrs = states[ent]?.attributes ?? {};
            const active = attrs.source === variables.source
              && (!variables.require_sound_mode
                || attrs.sound_mode === variables.require_sound_mode);
            if (active) {
              return 'var(--state-icon-active-color, rgb(255, 214, 10))';
            }
            return 'var(--paper-item-icon-color)';
          ]]]
      - filter: |
          [[[
            const ent = variables.media_player_entity;
            const attrs = states[ent]?.attributes ?? {};
            const active = attrs.source === variables.source
              && (!variables.require_sound_mode
                || attrs.sound_mode === variables.require_sound_mode);
            if (active) {
              return 'drop-shadow(0 0 3px rgb(255, 214, 10)) drop-shadow(0 0 10px rgba(255, 214, 10, 0.5))';
            }
            return 'none';
          ]]]
  tap_action:
    action: call-service
    haptic: success
    service: '[[[ return "script." + variables.script ]]]'
