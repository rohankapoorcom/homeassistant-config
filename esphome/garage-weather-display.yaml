---
substitutions:
  device_name: garage-weather-display
  friendly_name: Garage Weather Display

  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_domain: !secret wifi_domain

packages:
  base: !include packages/base.yaml
  wifi: !include packages/wifi.yaml
  weather-display: !include packages/weather-display.yaml

# Check if motion is detected in the Garage.
binary_sensor:
  - platform: homeassistant
    entity_id: binary_sensor.garage_motion
    id: motion_detected_internal
    internal: True
  - id: !extend motion_detected
    lambda: 'return id(motion_detected_internal).state;'
