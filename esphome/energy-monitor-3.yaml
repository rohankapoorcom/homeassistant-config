---
.defaultfilters:
  - &invert
    # invert and filter out any values below 0.
    lambda: 'return max(-x, 0.0f);'
  - &throttle_energy
    or:
      - delta: 10
      - throttle: 60s

substitutions:
  device_name: energy-monitor-3
  friendly_name: Energy Monitor 3

  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_domain: !secret wifi_domain

packages:
  base: !include packages/base.yaml
  wifi: !include packages/wifi.yaml
  emporia_vue: !include
    file: packages/emporia_vue2.yaml
    vars:
      cir1_name: Hallway & Kitchen Lights
      cir1_phase: phase_b
      cir2_name: Living Room Lights
      cir2_phase: phase_b
      cir3_name: Office Closet
      cir3_phase: phase_a
      cir4_name: Office PC
      cir4_phase: phase_a
      cir5_name: Battery Input Phase B
      cir5_phase: phase_b
      cir6_name: Battery Input Phase A
      cir6_phase: phase_a
      cir7_name: "Battery Charger #1"
      cir7_phase: phase_b
      cir8_name: "Battery Charger #2"
      cir8_phase: phase_b
      cir9_name: Circuit 9
      cir9_phase: phase_a
      cir10_name: Circuit 10
      cir10_phase: phase_a
      cir11_name: Circuit 11
      cir11_phase: phase_b
      cir12_name: Circuit 12
      cir12_phase: phase_b
      cir13_name: Circuit 13
      cir13_phase: phase_a
      cir14_name: Circuit 14
      cir14_phase: phase_a
      cir15_name: Circuit 15
      cir15_phase: phase_b
      cir16_name: Circuit 16
      cir16_phase: phase_b

      phasea_calibration: "0.02107785252983390177194893144823"
      phaseb_calibration: "0.0224095129628974640116011742652"

sensor:
  - id: !extend cir5_internal
    filters: !remove
  - id: !extend cir5_internal
    filters: [ *invert ]
  - id: !extend cir6_internal
    filters: !remove
  - id: !extend cir6_internal
    filters: [ *invert ]
  - id: !extend cir7_internal
    filters: [ multiply: 2 ]
  - id: !extend cir8_internal
    filters: [ multiply: 2 ]
  
  - platform: template
    name: "Battery Input Total Power"
    lambda: return id(cir5_internal).state + id(cir6_internal).state;
    update_interval: 1s
    id: battery_input_total_power
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - name: "Battery Input Total Daily Energy"
    id: battery_input_total_daily_energy
    power_id: battery_input_total_power
    platform: total_daily_energy
    accuracy_decimals: 0
    restore: false
    unit_of_measurement: Wh
    state_class: total_increasing
    device_class: energy
    filters: [ *throttle_energy ]