        it.printf(390, 642, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%1.1f in", id(weather_precipitation_3).state);

        it.strftime(240, 710, id(font_small_book), COLOR_ON, TextAlign::TOP_CENTER, "Refreshed at %I:%M %p", id(my_time).now());
      }
