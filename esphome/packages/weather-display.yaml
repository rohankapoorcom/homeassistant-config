esphome:
  name: $device_name
  friendly_name: $friendly_name
  on_boot:
      priority: 200.0
      then:
        - component.update: eink_display
        - wait_until:
            condition:
              lambda: 'return id(data_updated) == true;'
              # Wait a bit longer so all the items are received
        - delay: 5s
        - logger.log: "Initial sensor data received: Refreshing display..."
        - lambda: 'id(initial_data_received) = true;'
        - script.execute: update_screen

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      # Bump task watchdog timeout to accommodate slow Waveshare 7.5" v2p
      # display refreshes (>5s). Without this, ESPHome 2026.2+ boot-loops on
      # this display model. See https://github.com/esphome/esphome/issues/14772
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

button:
  - platform: shutdown
    name: "Shutdown"
  - platform: template
    name: "Refresh Screen"
    entity_category: config
    on_press:
      - script.execute: update_screen
      
globals:
  - id: data_updated
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: initial_data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: recorded_display_refresh
    type: int
    restore_value: yes
    initial_value: '0'
  - id: instant_update_completed
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: update_screen
    then:
      - lambda: 'id(data_updated) = false;'
      - component.update: eink_display
      - lambda: 'id(recorded_display_refresh) += 1;'
      - lambda: 'id(display_last_update).publish_state(id(my_time).now().timestamp);'
      
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(data_updated) == true;'
          then:
            - if:
                condition:
                  binary_sensor.is_on: motion_detected
                then:
                  - logger.log: "Sensor data updated and activity in home detected: Refreshing display..."
                  - script.execute: update_screen
                else:
                  - logger.log: "Sensor data updated but no activity in home - skipping display refresh."
          else:
            - logger.log: "No sensors updated - skipping display refresh."


