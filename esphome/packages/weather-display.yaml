        it.printf(335, 430, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "Air Quality");
        it.printf(335, 455, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%.0f AQI", id(exterior_aqi).state);        

        it.printf(105, 522, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%s", id(weather_timestamp_0).state.c_str());
        it.printf(105, 546, id(font_mdi_medium), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map[id(weather_condition_0).state.c_str()].c_str());
        it.printf(85, 594, id(font_mdi_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["thermometer"].c_str());
        it.printf(115, 594, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%2.0f°F", id(weather_temperature_0).state);
        it.printf(84, 618, id(font_mdi_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["humidity"].c_str());
        it.printf(114, 618, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%2.0f%%", id(weather_humidity_0).state);
        it.printf(85, 642, id(font_mdi_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["precipitation"].c_str());
        it.printf(120, 642, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%1.1f in", id(weather_precipitation_0).state);

        it.printf(195, 522, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "%s", id(weather_timestamp_1).state.c_str());
        it.printf(195, 546, id(font_mdi_medium), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map[id(weather_condition_1).state.c_str()].c_str());
        it.printf(175, 594, id(font_mdi_small), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["thermometer"].c_str());
