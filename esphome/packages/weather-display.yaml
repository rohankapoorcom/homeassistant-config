# Pins for Waveshare ePaper ESP Board
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO14

# Now render everything on the ePaper screen.
display:
  - platform: waveshare_epaper
    id: eink_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    busy_pin:
      number: GPIO25
      inverted: true
    reset_pin: GPIO26
    reset_duration: 2ms
    model: 7.50inv2p
    update_interval: never
    rotation: 90°
    lambda: |-
      // Map weather states to MDI characters.
      std::map<std::string, std::string> weather_icon_map
        {
          {"cloudy", "\U000F0590"},
          {"cloudy-alert", "\U000F0F2F"},
          {"cloudy-arrow-right", "\U000F0E6E"},
          {"clear-night", "\U000F0594"},
          {"fog", "\U000F0591"},
          {"hail", "\U000F0592"},
          {"hazy", "\U000F0F30"},
          {"hurricane", "\U000F0898"},
          {"lightning", "\U000F0593"},
          {"lightning-rainy", "\U000F067E"},
          {"night", "\U000F0594"},
          {"night-partly-cloudy", "\U000F0F31"},
          {"partlycloudy", "\U000F0595"},
          {"partly-lightning", "\U000F0F32"},
          {"partly-rainy", "\U000F0F33"},
          {"partly-snowy", "\U000F0F34"},
          {"partly-snowy-rainy", "\U000F0F35"},
          {"pouring", "\U000F0596"},
          {"rainy", "\U000F0597"},
          {"snowy", "\U000F0598"},
          {"snowy-heavy", "\U000F0F36"},
          {"snowy-rainy", "\U000F067F"},
          {"sunny", "\U000F0599"},
          {"sunny-alert", "\U000F0F37"},
          {"sunny-off", "\U000F14E4"},
          {"sunset", "\U000F059A"},
          {"sunset-down", "\U000F059B"},
          {"sunset-up", "\U000F059C"},
          {"tornado", "\U000F0F38"},
          {"windy", "\U000F059D"},
          {"windy-variant", "\U000F059E"},
          {"thermometer", "\U000F050F"},
          {"humidity", "\U000F058E"},
          {"precipitation", "\U000F0E0A"},
          {"air-filter", "\U000F0D43"},
          {"gauge", "\U000F029A"},
        };

      // Show loading screen before data is received.
      if (id(initial_data_received) == false) {
        it.printf(240, 390, id(font_small_bold), COLOR_ON, TextAlign::TOP_CENTER, "WAITING FOR DATA...");
      } else {

        // Weather Section
        it.printf(240, 84, id(font_title), COLOR_ON, TextAlign::TOP_CENTER, "WEATHER");

        it.printf(100, 158, id(font_mdi_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map[id(weather_condition_now).state.c_str()].c_str());
        it.printf(300, 158, id(font_large_bold), COLOR_ON, TextAlign::TOP_CENTER, "%2.0f°F", id(weather_temperature).state);

        it.printf(240, 272, id(font_medium_bold), COLOR_ON, TextAlign::TOP_CENTER, "Feels Like: %2.0f°F", id(weather_feels_like_temperature).state);

        it.printf(70, 320, id(font_mdi_medium_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["sunset-up"].c_str());
        it.printf(105, 320, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "Sunrise");
        it.printf(105, 345, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%s", id(sunrise_timestamp).state.c_str());

        it.printf(70, 375, id(font_mdi_medium_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["humidity"].c_str());
        it.printf(105, 375, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "Humidity");
        it.printf(105, 400, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%2.0f%%", id(exterior_humidity).state);

        it.printf(70, 430, id(font_mdi_medium_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["sunny"].c_str());
        it.printf(105, 430, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "UV Index");
        it.printf(105, 455, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%1.0f UVI", id(exterior_uv_index).state);

        it.printf(300, 320, id(font_mdi_medium_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["sunset-down"].c_str());
        it.printf(335, 320, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "Sunset");
        it.printf(335, 345, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%s", id(sunset_timestamp).state.c_str());

        it.printf(300, 375, id(font_mdi_medium_large), COLOR_ON, TextAlign::TOP_CENTER, "%s", weather_icon_map["gauge"].c_str());
        it.printf(335, 375, id(font_small_book), COLOR_ON, TextAlign::TOP_LEFT, "Pressure");
        it.printf(335, 400, id(font_small_medium_bold), COLOR_ON, TextAlign::TOP_LEFT, "%2.2f inHg", id(exterior_relative_pressure).state);

