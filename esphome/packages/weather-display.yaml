binary_sensor:
  - platform: template
    name: "Motion Detected"
    id: motion_detected
    lambda: 'return true;'
    internal: True
    on_state:
      - then:
        - if:
            condition:
              binary_sensor.is_on: motion_detected
            then:
              - if:
                  condition:
                    and:
                      - lambda: 'return id(instant_update_completed) == false;'
                      - lambda: 'return id(data_updated) == true;'
                  then:
                    - logger.log: "Motion Sensor activated and new data is present: Refreshing display..."
                    - script.execute: update_screen
            else:
              - lambda: 'id(instant_update_completed) = false;'  


