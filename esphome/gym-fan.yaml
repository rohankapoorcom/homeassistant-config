---
substitutions:
  device_name: gym-fan
  friendly_name: Gym Fan
  
  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_domain: !secret wifi_domain

esphome:
  name: $device_name
  friendly_name: $friendly_name

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_BROWNOUT_DET_LVL_SEL_7: y
      CONFIG_ESP_BROWNOUT_DET_LVL: "7"

packages:
  base: !include packages/base.yaml
  wifi: !include packages/wifi.yaml

wifi:
  power_save_mode: LIGHT
  output_power: 13dB

external_components:
  - source:
      type: git
      url: https://github.com/rohankapoorcom/esp-mcp4x-digipot.git
      ref: fix/new-number-required-args
    components: [mcp4xxx]

logger:
  hardware_uart: UART0
  level: WARN

spi:
  clk_pin: GPIO19
  mosi_pin: GPIO20

mcp4xxx:
  - id: mcp4131_digipot
    internal: true
    cs_pin: GPIO18
    initial_value: 0

fan:
  - platform: mcp4xxx
    id: gym_fan
    mcp4xxx_id: mcp4131_digipot
    name: Fan
    speed_count: 100
